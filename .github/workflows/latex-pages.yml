name: Build LaTeX and Deploy PDFs

on:
  push:
    branches: main
    paths:
      - docs/**
      - .github/workflows/latex-pages.yml
  pull_request:
    branches: main
    paths:
      - docs/**
      - .github/workflows/latex-pages.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install TeX Live
        run: |
          sudo apt-get update
          #sudo apt-get install -y texlive-full #if needed, but very large
          sudo apt-get install -y --fix-missing texlive-latex-extra texlive-science texlive-fonts-extra #texlive-xetex texlive-luatex texlive-bibtex-extra 
      - name: Compile LaTeX
        run: |
          MAIN_TEX_FILES="
          docs/ProblemStatementAndGoals/ProblemStatement.tex
          docs/SRS/SRS.tex
          docs/VnVPlan/VnVPlan.tex
          docs/VnVReport/VnVReport.tex
          docs/ReflectAndTrace/ReflectAndTrace.tex
          "

          for file in $MAIN_TEX_FILES; do
            test -f "$file"
            make -B "${file%.tex}.pdf"
          done
      - name: Prepare site
        run: |
          set -euo pipefail

          # Always start from repo root
          pwd
          ls

          # Recreate public directory
          rm -rf public
          mkdir -p public
          
          # Copy all PDFs from docs/, including ones not rebuilt in this run
          find docs -name "*.pdf" | while read -r pdf; do
            rel="${pdf#docs/}"
            mkdir -p "public/$(dirname "$rel")"
            cp "$pdf" "public/$rel"
          done
          
          # Generate PDF list (paths relative to site root)
          PDF_LIST=$(find public -name "*.pdf" | sort | sed 's|^public/||' | awk -F/ '
          {
            dir = $1
            file = $NF
            groups[dir] = groups[dir] "<li><a href=\"" $0 "\">" file "</a></li>\n"
          }
          END {
            for (dir in groups) {
              printf "<h2>%s</h2>\n<ul>\n%s</ul>\n", dir, groups[dir]
            }
          }')

          # Ensure site template exists
          test -f site/index.html

          # Build index.html safely
          awk -v list="$PDF_LIST" '
            /<!-- PDF_LIST -->/ { print list; next }
            { print }
          ' site/index.html > public/index.html

          # Copy static assets
          cp site/style.css public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
